name: ci

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'test/**'
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - '3.12'
          - '3.13'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install --upgrade pip setuptools wheel && python -m pip install -e ".[dev]" --no-build-isolation

      - name: Verify dependency metadata
        run: python -m pip check

      - name: Run bytecode compilation smoke
        run: python -m compileall -q src tests

      - name: Run coverage gate
        if: runner.os != 'Windows'
        run: make coverage

      - name: Run coverage gate on Windows
        if: runner.os == 'Windows'
        run: |
          $env:PYTHONPATH = "src"
          python -m coverage erase
          python -m coverage run -m unittest discover -s tests -v
          python -m coverage combine
          python -m coverage report

      - name: Run installed-package smoke
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        run: make package-smoke

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Docker smoke workflow
        run: make docker-smoke
