name: ci

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - '3.12'
          - '3.13'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install --upgrade pip setuptools wheel && python -m pip install -e . --no-build-isolation

      - name: Run test suite
        if: runner.os != 'Windows'
        run: make test

      - name: Run test suite on Windows
        if: runner.os == 'Windows'
        run: python -m unittest discover -s tests -v

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t leximask:ci .
